name: 🐳 copy & Push Launcher Docker Image

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g., v0.2.3)"
        required: true
        type: string
  workflow_call:
    inputs:
      tag:
        description: "Release tag"
        required: true
        type: string

env:
  DOCKERHUB_REGISTRY: docker.io
  DOCKERHUB_IMAGE_NAME: ${{ vars.DOCKERHUB_REPOSITORY || github.repository }}

jobs:
  build:
    name: 🏗️ Build Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      # ── Checkout ──────────────────────────────
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      # ── Docker Buildx ─────────────────────────
      - name: 🔧 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Login to Docker Hub ────────────────────
      - name: 🔑 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKERHUB_REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Metadata (tags & labels) ──────────────
      - name: 🏷️ Prepare image tags
        id: tags
        shell: bash
        run: |
          tag="${{ inputs.tag }}"
          
          # 处理最终镜像标签：添加 -launcher 后缀（如果还没有的话）
          if [[ "$tag" == *"-launcher" ]]; then
            final_tag="$tag"
          else
            final_tag="${tag}-launcher"
          fi
          
          # 构建 tags 列表
          tags_list="${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:${final_tag}"
          
          # 只有 tag 以 "v" 开头时才添加 latest 标签
          if [[ "$tag" == v* ]]; then
            tags_list="${tags_list},${{ env.DOCKERHUB_REGISTRY }}/${{ env.DOCKERHUB_IMAGE_NAME }}:latest"
          fi
          
          echo "tags_list=${tags_list}" >> "$GITHUB_OUTPUT"
          
          # 基础镜像标签：用于从 sipeed/picoclaw 复制二进制文件
          if [[ "$tag" == *"-launcher" ]]; then
            base_tag="$tag"
          else
            base_tag="${tag}-launcher"
          fi
          echo "base_tag=${base_tag}" >> "$GITHUB_OUTPUT"

      # ── Build & Push ──────────────────────────
      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile_debian.launcher
          push: true
          tags: ${{ steps.tags.outputs.tags_list }}
          build-args: |
            BASE_TAG=${{ steps.tags.outputs.base_tag }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
