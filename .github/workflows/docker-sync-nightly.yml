name: 🔄 Sync Nightly Launcher Docker Image

on:
  schedule:
    - cron: '0 */8 * * *'  # 每8小时运行一次
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-nightly:
    name: 🔄 Sync Nightly Launcher
    uses: ./.github/workflows/docker-copy-launcher.yml
    with:
      tag: "nightly-launcher"
    secrets: inherit
